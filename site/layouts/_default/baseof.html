<!doctype html>
<html lang="{{ site.Language.Locale | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("aeb-theme");
        if (theme === "dark" || theme === "light") {
          document.documentElement.setAttribute("data-theme", theme);
        }
      } catch (error) {}
    })();
  </script>
  {{ with resources.Get "css/site.css" }}
  <link rel="stylesheet" href="{{ .RelPermalink }}">
  {{ end }}
  {{ with resources.Get "js/site.js" }}
  <script src="{{ .RelPermalink }}" defer></script>
  {{ end }}
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
      <div class="site-header-actions">
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ "episodes/" | relURL }}">Episodes</a>
          <a href="{{ "questions/" | relURL }}">Questions</a>
          <a href="{{ "search/" | relURL }}">Question Index</a>
        </nav>
        <label class="theme-picker">
          <span class="visually-hidden">Theme</span>
          <select data-theme-picker aria-label="Theme">
            <option value="system">System</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
      </div>
    </div>
  </header>
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">
      Transitional Hugo build generated from {{ site.Params.sourceCorpus }}.
    </div>
  </footer>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
