{{ define "main" }}
{{ $questions := hugo.Data.questions }}
<h1 class="page-title">{{ .Title }}</h1>
<section class="search-panel" data-question-search data-base-path="{{ site.Home.RelPermalink }}">
  <div class="search-controls">
    <div class="field field-grow">
      <label for="question-search-input">Search text</label>
      <input id="question-search-input" data-search-input type="search" placeholder="Try exodus, cherubim, chronology, psalm 82">
    </div>
    <div class="field">
      <label for="question-type-filter">Page type</label>
      <select id="question-type-filter" data-type-filter>
        <option value="all">All pages</option>
        <option value="numbered">Numbered streams</option>
        <option value="special">Special pages</option>
      </select>
    </div>
    <div class="field field-narrow">
      <label for="question-episode-filter">Episode</label>
      <input id="question-episode-filter" data-episode-filter type="number" min="1" inputmode="numeric" placeholder="267">
    </div>
    <div class="field">
      <label for="question-sort">Sort</label>
      <select id="question-sort" data-sort-control>
        <option value="relevance">Relevance</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="time">Timestamp</option>
      </select>
    </div>
    <button type="button" class="secondary-button" data-clear-search>Clear</button>
  </div>
  <div class="results-bar">
    <div class="results-summary" data-result-count></div>
    <button type="button" class="secondary-button compact-button" data-load-more hidden>Show more</button>
  </div>
  <ol class="search-results" data-search-results></ol>
  <div class="empty-state" data-empty-state hidden>No matching questions found.</div>
</section>

<template id="question-result-template">
  <li class="search-result" data-result-item>
    <div class="search-result-header">
      <div>
        <div class="search-result-meta" data-result-meta></div>
        <a class="search-result-title" data-episode-link href=""></a>
      </div>
      <a class="search-result-time" data-video-link href="" target="_blank" rel="noopener noreferrer"></a>
    </div>
    <p class="search-result-question" data-result-question></p>
    <p class="search-result-answer" data-result-answer></p>
  </li>
</template>

<script type="application/json" id="question-search-data">{{ $questions | jsonify | safeJS }}</script>
{{ end }}

{{ define "scripts" }}
<script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.2/dist/umd/index.min.js" defer></script>
{{ with resources.Get "js/search.js" }}
<script src="{{ .RelPermalink }}" defer></script>
{{ end }}
{{ end }}
