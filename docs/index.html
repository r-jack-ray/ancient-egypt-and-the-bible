<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ancient Egypt and the Bible Search</title>
</head>
<body>
  <h1>Ancient Egypt and the Bible Search</h1>

  <form id="searchForm">
    <label for="searchText">Search this project</label>
    <br>
    <input id="searchText" type="search" placeholder="Joseph, Exodus, Ramesses, chronology">
    <button type="submit">Search</button>
  </form>

  <p>
    Searches files under <code>/src</code>, including curated Markdown pages and transcript data.
  </p>

  <script>
    document.getElementById("searchForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const term = document.getElementById("searchText").value.trim();

      const query = [
        "repo:r-jack-ray/ancient-egypt-and-the-bible",
        "path:/src/**",
        term
      ].filter(Boolean).join(" ");

      window.location.href =
        "https://github.com/search?type=code&q=" + encodeURIComponent(query);
    });
  </script>
</body>
</html>
